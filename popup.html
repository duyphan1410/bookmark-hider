<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Hider</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header-icon {
      font-size: 18px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      min-height: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.on {
      background: #ef4444;
    }

    .status-dot.off {
      background: #22c55e;
    }

    .status-text {
      font-size: 12px;
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.turn-on {
      background: #7c3aed;
      color: #fff;
    }

    .btn.turn-off {
      background: #ef4444;
      color: #fff;
    }

    .btn.loading {
      background: #444;
      color: #aaa;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-text {
      margin-top: 10px;
      font-size: 11px;
      color: #f87171;
      text-align: center;
      display: none;
    }

    .warning-text {
      margin-top: 10px;
      font-size: 10px;
      color: #fbbf24;
      text-align: center;
      display: none;
      line-height: 1.6;
    }

    .warning-text a {
      color: #fbbf24;
      font-weight: 600;
      cursor: pointer;
    }

    .divider {
      margin: 12px 0 10px;
      border-top: 1px solid #2a2a2a;
    }

    .btn-recovery {
      width: 100%;
      padding: 7px;
      background: none;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-recovery:hover {
      color: #aaa;
      border-color: #555;
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="header-icon">🔖</span>
    <h1>Bookmark Hider</h1>
  </div>

  <div class="status-row">
    <div class="status-dot off" id="statusDot"></div>
    <span class="status-text" id="statusText">Bookmarks are visible</span>
  </div>

  <button class="btn turn-on" id="toggleBtn">Hide Bookmarks</button>

  <p class="error-text" id="errorText"></p>
  <p class="warning-text" id="warningText">
    ⚠️ Export your bookmarks before uninstalling —
    <a id="recoveryLink" href="#">open Recovery tool</a>
  </p>

  <div class="divider"></div>
  <button class="btn btn-recovery" id="recoveryBtn">🛟 Recovery tool</button>

  <script src="popup.js"></script>
</body>

</html>
